<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Login | ROT3</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41; /* Matrix green color */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            border: 2px solid #00ff41;
            padding: 30px;
            box-shadow: 0 0 15px #00ff41;
            background: rgba(0, 0, 0, 0.9);
            width: 350px;
        }

        h2 { text-align: center; text-transform: uppercase; letter-spacing: 3px; }

        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            background: #111;
            border: 1px solid #00ff41;
            color: #00ff41;
            box-sizing: border-box;
        }

        .output-container {
            margin-top: 20px;
            padding: 10px;
            border-top: 1px dashed #00ff41;
            font-size: 0.9rem;
        }

        #rot3-output {
            color: #ff003c; /* Cyber pink/red for the encoded part */
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Access Terminal</h2>
    <input type="text" id="username" placeholder="USERNAME" autocomplete="off">
    <input type="password" id="password" placeholder="PASSWORD" oninput="convertToRot3()">
    
    <div class="output-container">
        <strong>ROT3 Encoded:</strong> <span id="rot3-output">...</span>
    </div>
</div>
