<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KAITHI_NETWORK | GHOST_VAULT</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body {
            background: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .vault-container {
            border: 1px solid var(--neon);
            padding: 40px;
            width: 380px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2);
            text-align: center;
        }
        h2 { letter-spacing: 5px; text-transform: uppercase; margin-bottom: 30px; }
        input {
            width: 100%; background: #0a0a0a; border: 1px solid #222;
            color: #fff; padding: 12px; margin: 10px 0; outline: none;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--neon); }
        button {
            width: 100%; background: var(--neon); color: #000;
            padding: 12px; border: none; font-weight: bold;
            cursor: pointer; margin-top: 20px; text-transform: uppercase;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px var(--neon); }
        #console-output {
            margin-top: 25px; font-size: 11px; text-align: left;
            border-top: 1px solid #222; padding-top: 15px; color: #888;
        }
    </style>
</head>
<body>

    <div class="vault-container">
        <h2>:: GHOST_VAULT ::</h2>
        <input type="email" id="email" placeholder="IDENTITY (admin@kaithi.net)">
        <input type="password" id="pass" placeholder="ACCESS_KEY (pentest123)">
        <button onclick="breach()">INITIALIZE_BREACH</button>
        
        <div id="console-output">> SYSTEM_IDLE...</div>
    </div>

    <script>
        async function breach() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const output = document.getElementById('console-output');

            output.innerText = "> INJECTING_EXPLOIT...";

            try {
                // Change URL when deploying to Vercel
                const response = await fetch('http://127.0.0.1:5000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();

                if (response.ok) {
                    output.style.color = "#00ff41";
                    output.innerHTML = `> ${data.status}: ${data.message}<br><br>> HINT: ${data.hint}`;
                    console.log("%c [!] FLAG_ENCRYPTED_IN_COOKIES", "color: #00ff41; font-weight: bold;");
                } else {
                    output.style.color = "red";
                    output.innerText = "> " + data.message;
                }
            } catch (err) {
                output.innerText = "> ERROR: CONNECTION_REFUSED";
            }
        }
    </script>
</body>
</html>
