<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KAITHI_NETWORK | THE_GHOST_VAULT</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body {
            background: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .login-box {
            border: 1px solid var(--neon);
            padding: 40px;
            width: 380px;
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            text-align: center;
        }
        h2 { letter-spacing: 5px; text-transform: uppercase; margin-bottom: 30px; }
        input {
            width: 100%; background: #0a0a0a; border: 1px solid #222;
            color: #fff; padding: 12px; margin: 10px 0; outline: none;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--neon); }
        button {
            width: 100%; background: var(--neon); color: #000;
            padding: 12px; border: none; font-weight: bold;
            cursor: pointer; margin-top: 20px; text-transform: uppercase;
        }
        #output { margin-top: 25px; font-size: 11px; text-align: left; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>:: KAITHI_VAULT ::</h2>
        <input type="text" id="username" placeholder="USERNAME">
        <input type="password" id="password" placeholder="PASSWORD">
        <button onclick="ignite()">INITIALIZE_BREACH</button>
        <div id="output">> SYSTEM_READY...</div>
    </div>

    <script>
        // "Ahh Valthukal Valthukal" -> Base64 -> ROT13
        // Code-la plain text-ah flag irukkaadhu
        const _0x_vlt = "Quib VZbsgu bxbcl BZbsgu bxbcl=";

        async function ignite() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const out = document.getElementById('output');

            out.innerText = "> INJECTING_PAYLOAD...";

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                
                const data = await res.json();

                if (res.ok) {
                    out.style.color = "#00ff41";
                    out.innerHTML = `> SUCCESS: ${data.message}<br><br>> HINT: ${data.hint}`;
                    
                    // REVEALING THE FLAG IN CONSOLE (CTF STYLE)
                    console.log("%c [!] ALERT: HIDDEN_PAYLOAD_EXTRACTED", "color: red; font-weight: bold; font-size: 15px;");
                    console.log("%c [DATA]: " + _0x_vlt, "color: #00ff41; background: #111; padding: 5px; border: 1px solid #00ff41;");
                    console.log("%c [!] INSTRUCTION: 1. ROT13 Decode -> 2. Base64 Decode", "color: gray;");
                } else {
                    out.style.color = "red";
                    out.innerText = "> " + data.message;
                }
            } catch (err) {
                out.innerText = "> ERROR: SERVER_UNREACHABLE";
            }
        }
    </script>
</body>
</html>
