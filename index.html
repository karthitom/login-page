<!DOCTYPE html>
<html>
<head>
    <title>KAITHI_NETWORK | AUTH</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #00ff41; padding: 30px; width: 320px; box-shadow: 0 0 15px #00ff4133; }
        input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; margin: 10px 0; box-sizing: border-box; outline: none; }
        button { width: 100%; background: #00ff41; color: #000; padding: 10px; border: none; font-weight: bold; cursor: pointer; }
        .switch { text-align: center; font-size: 11px; margin-top: 15px; cursor: pointer; text-decoration: underline; }
        #status { margin-top: 15px; font-size: 11px; text-align: center; color: #00ff41; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title">:: LOGIN ::</h2>
        <input type="email" id="email" placeholder="EMAIL_ID">
        <input type="password" id="password" placeholder="PASSWORD">
        <button onclick="runAuth()">INITIALIZE</button>
        <div class="switch" id="toggle" onclick="toggle()">New User? Register</div>
        <div id="status"></div>
    </div>

    <script>
        let mode = 'login';
        function toggle() {
            mode = (mode === 'login') ? 'register' : 'login';
            document.getElementById('title').innerText = mode === 'login' ? ':: LOGIN ::' : ':: REGISTER ::';
        }

        async function runAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status');
            
            status.innerText = "> INITIALIZING...";
            try {
                // Vercel deployment aana vatti unga full URL-ai inga podunga
                const res = await fetch(`/${mode}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if(res.ok) {
                    status.innerText = "> SUCCESS!";
                    if(mode === 'login') {
                        localStorage.setItem('token', data.access_token);
                        setTimeout(() => window.location.href = "dashboard.html", 1000);
                    } else {
                        setTimeout(toggle, 1500);
                    }
                } else {
                    status.innerText = "> ERROR: " + data.msg;
                }
            } catch(e) { status.innerText = "> CONNECTION_FAILED"; }
        }
    </script>
</body>
</html>
